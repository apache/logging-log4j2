name: codeql-analysis

on:
  push:
    branches: [ "2.x", "main" ]
  pull_request:
    branches: [ "2.x", "main", "feat/2.x/xinclude-resolver" ]
    types:
      # Standard types
      - opened
      - synchronize
      - reopened
      # Used in Dependabot PRs to retrigger required workflows
      - ready_for_review
  schedule:
    - cron: '32 12 * * 5'

# Cancel in-progress runs when a newer commit lands on the same PR; pushes to 2.x run to completion.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions: read-all

jobs:

  analyze:
    uses: apache/logging-parent/.github/workflows/codeql-analysis-reusable.yaml@gha/v0
    with:
      java-version: |
        8
        17
    # Permissions required to publish Security Alerts
    permissions:
      actions: read
      contents: read
      security-events: write
